name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'scripts/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'vitest.config.ts'
      - 'playwright.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'scripts/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'vitest.config.ts'
      - 'playwright.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Job 1: Lint · Types · Unit Tests · Build ────────────────────────────
  ci:
    name: Lint · Types · Tests · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # O package-lock.json foi gerado no Windows e não contém binários
        # opcionais do Linux (rollup, lightningcss). Deletar o lock no CI
        # força npm a resolver os opcionais corretos para a plataforma Linux.
        # As versões dos pacotes são controladas pelos ranges em package.json.
        run: |
          rm -f package-lock.json
          npm install --no-audit

      - name: Validate docs
        run: npm run validate:docs

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests
        run: npm run test:coverage -- --reporter=verbose --reporter=github-actions

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Build
        run: npm run build

  # ─── Job 2: E2E com Playwright ───────────────────────────────────────────
  e2e:
    name: E2E · Playwright
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
